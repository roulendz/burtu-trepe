<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="30%" stop-color="#1a1a3e"/>
      <stop offset="65%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#533483"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f093fb"/>
      <stop offset="50%" stop-color="#f5576c"/>
      <stop offset="100%" stop-color="#fda085"/>
    </linearGradient>
    <radialGradient id="moon" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="100%" stop-color="#fdd835"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Star field -->
  <g fill="#fff">
    <circle cx="80"   cy="60"  r="1.8" opacity="0.7"/>
    <circle cx="200"  cy="120" r="1.2" opacity="0.5"/>
    <circle cx="320"  cy="80"  r="2"   opacity="0.85"/>
    <circle cx="450"  cy="160" r="1.4" opacity="0.6"/>
    <circle cx="580"  cy="50"  r="1.8" opacity="0.7"/>
    <circle cx="720"  cy="110" r="1"   opacity="0.5"/>
    <circle cx="860"  cy="70"  r="2.2" opacity="0.9"/>
    <circle cx="1130" cy="190" r="1.4" opacity="0.6"/>
    <circle cx="100"  cy="220" r="1.2" opacity="0.5"/>
    <circle cx="650"  cy="180" r="1.6" opacity="0.6"/>
  </g>

  <!-- Moon -->
  <circle cx="1050" cy="120" r="55" fill="url(#moon)" opacity="0.95" filter="url(#glow)"/>

  <!-- Keyboard emoji as the hero element -->
  <text x="600" y="290" text-anchor="middle" font-size="170"
        font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif">⌨️</text>

  <!-- Title with gradient -->
  <text x="600" y="430" text-anchor="middle"
        font-family="Nunito, system-ui, -apple-system, Segoe UI, sans-serif"
        font-weight="900" font-size="120" fill="url(#title)" letter-spacing="-2">Burtu Trepe</text>

  <!-- Subtitle -->
  <text x="600" y="490" text-anchor="middle"
        font-family="Nunito, system-ui, -apple-system, Segoe UI, sans-serif"
        font-weight="600" font-size="34" fill="rgba(255,255,255,0.78)">Mācies rakstīt latviski — solis pa solim</text>

  <!-- Bottom badges -->
  <g font-family="Nunito, system-ui, -apple-system, Segoe UI, sans-serif"
     font-weight="700" font-size="26">
    <rect x="320"  y="540" width="200" height="48" rx="24" fill="rgba(245,87,108,0.25)" stroke="rgba(245,87,108,0.5)" stroke-width="2"/>
    <text x="420"  y="572" text-anchor="middle" fill="#fda085">16 līmeņi</text>

    <rect x="540"  y="540" width="190" height="48" rx="24" fill="rgba(56,239,125,0.22)" stroke="rgba(56,239,125,0.45)" stroke-width="2"/>
    <text x="635"  y="572" text-anchor="middle" fill="#38ef7d">Bezmaksas</text>

    <rect x="750"  y="540" width="200" height="48" rx="24" fill="rgba(79,172,254,0.22)" stroke="rgba(79,172,254,0.45)" stroke-width="2"/>
    <text x="850"  y="572" text-anchor="middle" fill="#4facfe">Bērniem 6+</text>
  </g>
</svg>
